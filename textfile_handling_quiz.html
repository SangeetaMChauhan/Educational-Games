<script>
const RAW_QUESTIONS = [
  {type:"MCQ", marks:1, file:"q_modes.py",
   q:'Which mode opens a file for both reading and writing, without deleting existing content, and places the cursor at the beginning?',
   opts:["'r+'","'w+'","'a+'","'x'"], ans:0},

  {type:"Output", marks:1, file:"q_readlines.py",
   q:'What will the following code display?',
   code:`f = open("data.txt","w")
f.write("Python\\nFile\\nHandling")
f.close()
f = open("data.txt","r")
print(f.readlines())`,
   opts:["['Python\\\\n', 'File\\\\n', 'Handling']","'Python\\\\nFile\\\\nHandling'","['Python', 'File', 'Handling']","Error: file not closed"], ans:0},

  {type:"MCQ", marks:1, file:"q_csv.py",
   q:'Which Python module provides functionality to read and write CSV (comma separated values) files?',
   opts:["pickle","csv","os","sys"], ans:1},

  {type:"Fill Blank", marks:1, file:"q_binary.py",
   q:'To open a file named "photo.jpg" for reading in binary mode, the correct mode string is ______.',
   opts:["'rb'","'r'","'br'","'bw'"], ans:0},

  {type:"MCQ", marks:1, file:"q_tell.py",

   opts:["seek()","tell()","pos()","loc()"], ans:1},

  {type:"MCQ", marks:1, file:"q_writerow.py",
   q:'Which csv.writer object method is used to write a single row (given as a list) into a CSV file?',

  {type:"MCQ", marks:1, file:"q_pickle.py",
   q:'Which function of the pickle module is used to convert a Python object into a byte stream and save it to a binary file?',
   opts:["pickle.load()","pickle.dump()","pickle.write()","pickle.save()"], ans:1},

  {type:"MCQ", marks:1, file:"q_default.py",
   q:'If no mode is specified while using the open() function, Python opens the file by default in which mode?',
   opts:["'w' (write, text)","'a' (append, text)","'r' (read, text)","'rb' (read, binary)"], ans:2},

  {type:"MCQ", marks:1, file:"q_read.py",
   q:'Which method of a file object reads the entire content of the file and returns it as a single string?',
   opts:["readline()","readlines()","read()","getline()"], ans:2},

  {type:"Output", marks:1, file:"q_iterate.py",
   q:'Which of the following is the most memory-efficient way to read a very large text file line by line?',
   code:`for line in file_object:
    print(line, end="")`,
   opts:["file_object.read() then split by newline","for line in file_object: (iterating directly over the object)","file_object.readlines() and store in a list first","Loading the whole file into a string variable"], ans:1},

  {type:"MCQ", marks:1, file:"q_notfound.py",
   q:'What happens when you try to open a file that does NOT exist using mode \'r\'?',
   opts:["A new empty file is created automatically","Python raises a FileNotFoundError","The program silently continues with no file object","Python raises a PermissionError"], ans:1},

  {type:"MCQ", marks:1, file:"q_with.py",
   q:'What is the main advantage of using the "with" statement (context manager) when working with files?',
   opts:["It makes the program run faster","It automatically opens the file in binary mode","It automatically closes the file, even if an exception occurs","It converts the file to a CSV file"], ans:2},

  {type:"MCQ", marks:1, file:"q_osremove.py",
   q:'Which function from the os module is used to permanently delete a file from the disk?',
   opts:["os.delete()","os.remove()","os.unlink_file()","os.erase()"], ans:1},

  {type:"MCQ", marks:1, file:"q_osrename.py",
   q:'Which statement correctly renames a file "old.txt" to "new.txt" using the os module?',
   opts:["os.rename('old.txt', 'new.txt')","os.rename('new.txt', 'old.txt')","os.renamefile('old.txt','new.txt')","os.mv('old.txt','new.txt')"], ans:0},

  {type:"MCQ", marks:1, file:"q_binsuffix.py",
   q:'In the mode string passed to open(), which letter, when added, indicates that the file should be treated as a binary file rather than a text file?',
   opts:["'x'","'t'","'b'","'+'"], ans:2},

  {type:"MCQ", marks:1, file:"q_dictreader.py",
   q:'When you read a CSV file using csv.DictReader, each row is returned as a/an ______.',
   opts:["tuple","dictionary (mapping column headers to values)","list of strings","set"], ans:1},

  {type:"MCQ", marks:1, file:"q_pickleload.py",
   q:'Which pickle module function is used to read back (deserialize) a Python object from a binary file?',

  {type:"MCQ", marks:1, file:"q_seek.py",
   q:'Which statement will move the file pointer back to the very beginning of an already-open file object "f"?',
   opts:["f.tell(0)","f.seek(0)","f.rewind()","f.start()"], ans:1},

  {type:"MCQ", marks:1, file:"q_writelines.py",
   q:'Which method is used to write a list of strings to a file in a single call, without adding newline characters automatically?',

  {type:"MCQ", marks:1, file:"q_unsupported.py",
   q:'If a file is opened only in read mode (\'r\') and you attempt f.write("hello"), what will Python raise?',
   opts:["io.UnsupportedOperation error","SyntaxError","No error, the write is ignored","IndentationError"], ans:0},

  {type:"MCQ", marks:1, file:"q_delimiter.py",
   q:'In the csv module, what is the default delimiter character used to separate values in a row?',
   opts:["Semicolon ( ; )","Tab ( \\t )","Comma ( , )","Pipe ( | )"], ans:2},

  {type:"Output", marks:2, file:"q_countlines.py",
   q:'A file "poem.txt" contains exactly 4 lines of text. What will the following code print?',
   code:`f = open("poem.txt","r")
count = 0
for line in f:
    count += 1
print(count)
f.close()`,
   opts:["3","4","0","Error"], ans:1},

  {type:"MCQ", marks:1, file:"q_textbinary.py",
   q:'Which type of file stores data in the form of ASCII/Unicode characters, where each line is terminated by a special character (EOL)?',
   opts:["Binary file","Text file","Pickle file","CSV binary file"], ans:1},

  {type:"MCQ", marks:1, file:"q_wbplus.py",
   q:'Which mode should be used to open a file for both reading and writing in binary format, truncating the file if it already exists?',
   opts:["'rb+'","'ab+'","'wb+'","'xb+'"], ans:2},

  {type:"MCQ", marks:1, file:"q_exception.py",
   q:'Which exception class should be used in a try-except block to specifically catch the error raised when a file to be opened for reading does not exist?',
   opts:["ValueError","FileNotFoundError","EOFError","ImportError"], ans:1},

  {type:"MCQ", marks:1, file:"q_pickleext.py",
   q:'Although not compulsory, which file extension is commonly used by convention for files created using the pickle module?',
   opts:[".csv",".txt or .dat / .pkl",".py",".json"], ans:1},

  {type:"MCQ", marks:1, file:"q_close.py",
   q:'Which method must be called on a file object to explicitly release the file resource when NOT using a "with" block?',
   opts:["end()","close()","exit()","release()"], ans:1},

  {type:"Output", marks:2, file:"q_tellseek.py",
   q:'Given a file opened in binary mode with the pointer at byte 0, what will the following print?',
   code:`f = open("data.bin","rb")
f.seek(5)
print(f.tell())`,
   opts:["0","5","Error, tell() needs an argument","None"], ans:1},

  {type:"MCQ", marks:1, file:"q_eol.py",
   q:'What does "EOL" stand for in the context of text file handling in Python?',
   opts:["End Of Line","End Of List","Error On Load","End Of Loop"], ans:0},

  {type:"MCQ", marks:1, file:"q_csvwriter.py",
   q:'Before writing rows to a CSV file, which object must first be created using the file handle, e.g. csv.writer(f)?',
   opts:["A csv reader object","A csv writer object","A pickle object","A file descriptor object"], ans:1},

  {type:"MCQ", marks:1, file:"q_appendbin.py",
   q:'Which mode string opens a file to append data at the end, treating the content as binary data?',
   opts:["'a'","'ab'","'wb'","'rb'"], ans:1},
];

let questions = [];
let current = 0;
let score = 0;
let answered = [];   // stores 'correct' | 'wrong' | null per question
let locked = false;

function shuffleArray(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function buildQuestions(){
  const shuffledQ = shuffleArray(RAW_QUESTIONS);
  questions = shuffledQ.map(orig => {
    const optionIndices = orig.opts.map((o,i)=>i);
    const shuffledIdx = shuffleArray(optionIndices);
    const newOpts = shuffledIdx.map(i => orig.opts[i]);
    const newAns = shuffledIdx.indexOf(orig.ans);
    return {...orig, opts:newOpts, ans:newAns};
  });
  current = 0;
  score = 0;
  answered = new Array(questions.length).fill(null);
  locked = false;
}

function escapeHtml(str){
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function highlightCode(code){
  let html = escapeHtml(code);
  html = html.replace(/(#.*)/g, '<span class="c1">$1</span>');
  html = html.replace(/(\bf\.\w+\(|\bopen\(|\bprint\(|\bos\.\w+\(|\bpickle\.\w+\(|\bcsv\.\w+\()/g, '<span class="c3">$1</span>');
  html = html.replace(/('[^']*')/g, '<span class="c2">$1</span>');
  return html;
}

function renderProgress(){
  const track = document.getElementById('progressTrack');
  track.innerHTML = '';
  questions.forEach((q,i)=>{
    const d = document.createElement('div');
    d.className = 'dot';
    if(answered[i] === 'correct') d.className += ' correct';
    else if(answered[i] === 'wrong') d.className += ' wrong';
    else if(i === current) d.className += ' current';
    else if(i < current) d.className += ' done';
    track.appendChild(d);
  });
}

function renderQuestion(){
  locked = answered[current] !== null;
  const q = questions[current];
  document.getElementById('qNumLabel').textContent = `Question ${current+1} of ${questions.length}`;
  document.getElementById('qTypeTag').textContent = q.type;
  document.getElementById('qMarksTag').textContent = q.marks === 1 ? '1 Mark' : q.marks + ' Marks';
  document.getElementById('fileTabName').textContent = q.file;
  document.getElementById('qText').textContent = q.q;

  const codeEl = document.getElementById('qCode');
  if(q.code){
    codeEl.style.display = 'block';
    codeEl.innerHTML = highlightCode(q.code);
  } else {
    codeEl.style.display = 'none';
    codeEl.innerHTML = '';
  }

  const wrap = document.getElementById('optionsWrap');
  wrap.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.opts.forEach((opt,i)=>{
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="letter">${letters[i]}</span><span>${escapeHtml(opt)}</span>`;
    btn.addEventListener('click', ()=> selectOption(i));
    wrap.appendChild(btn);
  });

  const fb = document.getElementById('feedback');
  fb.textContent = '';
  fb.className = 'feedback';

  if(locked){
    revealAnswer(answered[current] === 'correct' ? q.ans : null, true);
  }

  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').textContent = current === questions.length-1 ? 'Finish ✓' : 'Next →';
  renderProgress();
  updateScorePill();
}

function updateScorePill(){
  document.getElementById('scorePill').textContent = `★ Score: ${score}/${questions.length}`;
}

function selectOption(i){
  if(locked) return;
  locked = true;
  const q = questions[current];
  const isCorrect = i === q.ans;
  answered[current] = isCorrect ? 'correct' : 'wrong';
  if(isCorrect) score++;
  revealAnswer(i, false, isCorrect);
  updateScorePill();
  renderProgress();
}

function revealAnswer(selectedIdx, isReplay, justAnswered){
  const q = questions[current];
  const opts = document.querySelectorAll('.opt');
  opts.forEach((btn,i)=>{
    btn.classList.add('disabled');
    if(i === q.ans){
      btn.classList.add('correct');
    } else if(i === selectedIdx){
      btn.classList.add('wrong');
    } else {
      btn.classList.add('dim');
    }
  });
  const fb = document.getElementById('feedback');
  if(isReplay){
    if(answered[current] === 'correct'){
      fb.textContent = '✓ You answered this correctly.';
      fb.className = 'feedback correct';
    } else {
      fb.textContent = `✗ Previously answered incorrectly. Correct answer highlighted above.`;
      fb.className = 'feedback wrong';
    }
  } else {
    if(justAnswered){
      fb.textContent = '✓ Correct! Well done.';
      fb.className = 'feedback correct';
    } else {
      fb.textContent = '✗ Not quite — correct answer highlighted in green.';
      fb.className = 'feedback wrong';
    }
  }
}

function goNext(){
  if(current === questions.length - 1){
    finishQuiz();
    return;
  }
  current++;
  renderQuestion();
}
function goPrev(){
  if(current === 0) return;
  current--;
  renderQuestion();
}

function finishQuiz(){
  document.getElementById('finalScore').textContent = `${score}/${questions.length}`;
  const pct = Math.round((score/questions.length)*100);
  let msg = 'Great effort on File Handling!';
  if(pct === 100) msg = 'Perfect score! You have mastered File Handling. 🏆';
  else if(pct >= 75) msg = 'Excellent work! Just a few concepts to revise.';
  else if(pct >= 50) msg = 'Good attempt! Revisit modes, seek/tell and csv/pickle.';
  else msg = 'Keep practicing — review the NCERT chapter on File Handling.';
  document.getElementById('finalMsg').textContent = msg;
  document.getElementById('resultOverlay').classList.add('show');
}

document.getElementById('nextBtn').addEventListener('click', goNext);
document.getElementById('prevBtn').addEventListener('click', goPrev);
document.getElementById('shuffleBtn').addEventListener('click', ()=>{
  buildQuestions();
  renderQuestion();
  document.getElementById('resultOverlay').classList.remove('show');
});
document.getElementById('restartBtn').addEventListener('click', ()=>{
  buildQuestions();
  renderQuestion();
  document.getElementById('resultOverlay').classList.remove('show');
});

document.addEventListener('keydown', (e)=>{
  if(['1','2','3','4'].includes(e.key)){
    const idx = parseInt(e.key)-1;
    const opts = document.querySelectorAll('.opt');
    if(opts[idx] && !locked) opts[idx].click();
  } else if(e.key === 'ArrowRight') goNext();
  else if(e.key === 'ArrowLeft') goPrev();
});

buildQuestions();
renderQuestion();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sequence It — Order the Code</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0e1016;
    --panel: #161925;
    --panel-2: #1c2032;
    --card: #1b1f2e;
    --card-border: #2b3049;
    --ink: #e7e9f2;
    --ink-dim: #8a90ab;
    --ink-faint: #565c78;
    --cyan: #5eead4;
    --violet: #a78bfa;
    --amber: #fbbf24;
    --rose: #fb7185;
    --emerald: #34d399;
    --danger: #ef476f;
    --trace-off: #2b3049;
    --font-ui: 'Space Grotesk', sans-serif;
    --font-code: 'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 15% -10%, rgba(94,234,212,0.07), transparent 45%),
      radial-gradient(circle at 100% 10%, rgba(167,139,250,0.08), transparent 40%),
      var(--bg);
    color:var(--ink);
    font-family:var(--font-ui);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--cyan);color:#0e1016;}

  /* ---------- Header ---------- */
  header{
    padding:28px 32px 18px;
    border-bottom:1px solid #1f2334;
    display:flex; align-items:flex-end; justify-content:space-between; gap:20px; flex-wrap:wrap;
  }
  .brand{display:flex; align-items:center; gap:12px;}
  .brand-mark{
    width:38px;height:38px;border-radius:9px;
    background:linear-gradient(135deg, var(--cyan), var(--violet));
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-code); font-weight:700; color:#0e1016; font-size:15px;
    flex-shrink:0;
  }
  .brand h1{font-size:19px; margin:0; font-weight:600; letter-spacing:0.2px;}
  .brand p{margin:2px 0 0; font-size:12.5px; color:var(--ink-dim); font-family:var(--font-code);}
  .score-pill{
    font-family:var(--font-code); font-size:13px; color:var(--ink);
    background:var(--panel-2); border:1px solid var(--card-border);
    padding:9px 16px; border-radius:999px; display:flex; align-items:center; gap:10px;
  }
  .score-pill .dot{width:7px;height:7px;border-radius:50%; background:var(--cyan); box-shadow:0 0 8px var(--cyan);}
  .score-track{width:90px; height:5px; border-radius:3px; background:#262a3d; overflow:hidden;}
  .score-fill{height:100%; background:linear-gradient(90deg, var(--cyan), var(--emerald)); width:0%; transition:width .5s cubic-bezier(.4,0,.2,1);}

  /* ---------- Layout ---------- */
  .layout{display:grid; grid-template-columns:260px 1fr; gap:0; min-height:calc(100vh - 84px);}
  @media (max-width:860px){ .layout{grid-template-columns:1fr;} }

  /* ---------- Sidebar ---------- */
  nav.sidebar{
    border-right:1px solid #1f2334;
    padding:20px 14px 40px;
    overflow-y:auto;
  }
  @media (max-width:860px){
    nav.sidebar{border-right:none; border-bottom:1px solid #1f2334; padding:16px 14px; max-height:none;}
  }
  .concept-group{margin-bottom:18px;}
  .concept-label{
    font-family:var(--font-code); font-size:10.5px; letter-spacing:1.4px; text-transform:uppercase;
    color:var(--ink-faint); padding:0 10px 8px; display:flex; align-items:center; gap:7px;
  }
  .concept-label .sw{width:8px;height:8px;border-radius:2px;}
  .prog-btn{
    width:100%; text-align:left; background:transparent; border:1px solid transparent;
    color:var(--ink-dim); font-family:var(--font-ui); font-size:13.5px; padding:9px 10px;
    border-radius:8px; cursor:pointer; display:flex; align-items:center; gap:10px;
    margin-bottom:2px; transition:background .15s, color .15s, border-color .15s;
  }
  .prog-btn:hover{background:var(--panel-2); color:var(--ink);}
  .prog-btn.active{background:var(--panel-2); color:var(--ink); border-color:var(--card-border);}
  .prog-btn .num{
    font-family:var(--font-code); font-size:11px; color:var(--ink-faint); width:18px; flex-shrink:0;
  }
  .prog-btn.active .num{color:var(--cyan);}
  .prog-btn .check{
    margin-left:auto; width:16px; height:16px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:10px;
    background:transparent; color:transparent; transition:all .2s;
  }
  .prog-btn.solved .check{background:var(--emerald); color:#0e1016;}
  .prog-btn.solved{color:var(--ink);}

  /* ---------- Main stage ---------- */
  main{padding:28px 34px 60px; max-width:760px;}
  @media (max-width:860px){ main{padding:22px 18px 50px;} }

  .stage-head{margin-bottom:6px;}
  .concept-tag{
    display:inline-flex; align-items:center; gap:6px; font-family:var(--font-code);
    font-size:11px; letter-spacing:.8px; text-transform:uppercase; padding:4px 10px 4px 8px;
    border-radius:999px; border:1px solid; margin-bottom:12px;
  }
  .concept-tag .sw{width:7px;height:7px;border-radius:50%;}
  .stage-head h2{font-size:24px; margin:0 0 6px; font-weight:600;}
  .stage-head .brief{color:var(--ink-dim); font-size:14px; line-height:1.5; margin:0 0 22px; max-width:60ch;}

  .toolbar{display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap;}
  .btn{
    font-family:var(--font-ui); font-size:13px; font-weight:600; border-radius:8px;
    padding:10px 16px; cursor:pointer; border:1px solid var(--card-border); background:var(--panel-2);
    color:var(--ink); transition:transform .12s, background .15s, border-color .15s, box-shadow .15s;
    display:inline-flex; align-items:center; gap:8px;
  }
  .btn:hover{transform:translateY(-1px); border-color:#3a4066;}
  .btn:active{transform:translateY(0);}
  .btn.primary{background:linear-gradient(135deg, var(--cyan), #38d9c4); color:#0b1420; border:none;}
  .btn.primary:hover{box-shadow:0 6px 20px -6px rgba(94,234,212,.5);}
  .btn:disabled{opacity:.4; cursor:not-allowed; transform:none; box-shadow:none;}

  /* ---------- Code stage / rail ---------- */
  .stage{position:relative; display:flex; gap:0;}
  .rail{width:30px; flex-shrink:0; position:relative;}
  .rail-num{
    height:52px; display:flex; align-items:center; justify-content:center;
    font-family:var(--font-code); font-size:11px; color:var(--ink-faint);
    position:relative;
  }
  .rail-num::after{
    content:''; position:absolute; left:50%; top:52px; width:2px; height:8px;
    background:var(--trace-off); transform:translateX(-50%); transition:background .35s;
  }
  .rail-num:last-child::after{display:none;}
  .rail-num.trace-on::after{background:var(--cyan); box-shadow:0 0 6px var(--cyan);}

  .list{flex:1; display:flex; flex-direction:column; gap:8px; position:relative; touch-action:none;}

  .card{
    background:var(--card); border:1px solid var(--card-border); border-radius:10px;
    padding:13px 14px; min-height:26px; display:flex; align-items:center; gap:12px;
    cursor:grab; user-select:none; position:relative;
    transition:border-color .2s, box-shadow .2s, background .2s;
  }
  .card:active{cursor:grabbing;}
  .card.dragging{
    z-index:20; cursor:grabbing; box-shadow:0 16px 34px -10px rgba(0,0,0,.6);
    border-color:var(--cyan); background:#1f2436;
  }
  .card .grip{
    color:var(--ink-faint); font-size:13px; letter-spacing:2px; flex-shrink:0; line-height:1;
    font-family:var(--font-code);
  }
  .card code{
    font-family:var(--font-code); font-size:13.5px; color:var(--ink); white-space:pre;
    overflow-x:auto; flex:1;
  }
  .card .indent-guide{
    display:inline-block; width:22px; flex-shrink:0; position:relative;
  }
  .card .indent-guide::before{
    content:''; position:absolute; left:9px; top:-13px; bottom:-13px; width:1.5px;
    background:#2b3049;
  }
  .card .microbtns{display:flex; flex-direction:column; gap:3px; flex-shrink:0; margin-left:auto;}
  .microbtns button{
    width:22px; height:16px; border:none; background:var(--panel-2); color:var(--ink-faint);
    border-radius:4px; cursor:pointer; font-size:9px; display:flex; align-items:center; justify-content:center;
    transition:background .15s, color .15s;
  }
  .microbtns button:hover{background:#2b3049; color:var(--ink);}
  .microbtns button:disabled{opacity:.25; cursor:default;}

  .card.correct{border-color:var(--emerald); background:linear-gradient(90deg, rgba(52,211,153,.08), transparent);}
  .card.correct code{color:#c7f9e5;}
  .card.wrong{border-color:var(--danger); animation:shake .35s;}
  .card.wrong code{color:#ffd0da;}

  @keyframes shake{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-5px);}
    40%{transform:translateX(4px);}
    60%{transform:translateX(-3px);}
    80%{transform:translateX(2px);}
  }

  .feedback-row{
    margin-top:16px; min-height:22px; font-family:var(--font-code); font-size:13px;
    display:flex; align-items:center; gap:8px;
  }
  .feedback-row.ok{color:var(--emerald);}
  .feedback-row.bad{color:var(--danger);}

  /* ---------- Terminal ---------- */
  .terminal{
    margin-top:20px; background:#0a0c12; border:1px solid #262b40; border-radius:12px;
    overflow:hidden; max-height:0; opacity:0; transition:max-height .5s ease, opacity .4s ease, margin .4s ease;
  }
  .terminal.show{max-height:340px; opacity:1;}
  .terminal-bar{
    background:#12141e; padding:9px 14px; display:flex; align-items:center; gap:7px;
    border-bottom:1px solid #262b40;
  }
  .terminal-bar span{width:9px;height:9px;border-radius:50%;}
  .terminal-bar .r{background:#fb7185;} .terminal-bar .y{background:#fbbf24;} .terminal-bar .g{background:#34d399;}
  .terminal-bar .label{margin-left:8px; font-family:var(--font-code); font-size:11px; color:var(--ink-faint);}
  .terminal-body{padding:14px 16px; font-family:var(--font-code); font-size:13px; color:#9dffcf; line-height:1.7; min-height:60px;}
  .terminal-body .line{opacity:0; animation:typeIn .3s forwards;}
  .terminal-body .prompt{color:var(--ink-faint);}
  @keyframes typeIn{ to{opacity:1;} }

  footer{
    text-align:center; color:var(--ink-faint); font-family:var(--font-code); font-size:11.5px;
    padding:26px 20px 34px;
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-mark">&lt;/&gt;</div>
    <div>
      <h1>Sequence It</h1>
      <p>drag the lines into the order the interpreter needs</p>
    </div>
  </div>
  <div class="score-pill">
    <span class="dot"></span>
    <span id="scoreText">Solved 0 / 12</span>
    <div class="score-track"><div class="score-fill" id="scoreFill"></div></div>
  </div>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>

  <main>
    <div class="stage-head">
      <div id="conceptTag"></div>
      <h2 id="progTitle"></h2>
      <p class="brief" id="progBrief"></p>
    </div>

    <div class="toolbar">
      <button class="btn primary" id="runBtn">▶ Run program</button>
      <button class="btn" id="shuffleBtn">⟲ Shuffle again</button>
    </div>

    <div class="stage">
      <div class="rail" id="rail"></div>
      <div class="list" id="list"></div>
    </div>

    <div class="feedback-row" id="feedback"></div>

    <div class="terminal" id="terminal">
      <div class="terminal-bar">
        <span class="r"></span><span class="y"></span><span class="g"></span>
        <span class="label" id="termLabel">output</span>
      </div>
      <div class="terminal-body" id="termBody"></div>
    </div>
  </main>
</div>

<footer>Tap ▲▼ or drag a card to reorder · lines snap into their track when the sequence compiles</footer>

<script>
(function(){
  "use strict";

  const CONCEPTS = {
    simple:  {label:"Simple Program", color:"#5eead4"},
    ifelse:  {label:"If / Else",      color:"#a78bfa"},
    ifelif:  {label:"If / Elif / Else", color:"#fbbf24"},
    forloop: {label:"For Loop",       color:"#fb7185"},
    whileloop:{label:"While Loop",    color:"#34d399"},
  };

  const programs = [
    { id:"p1", concept:"simple", title:"Add Two Numbers",
      brief:"Read two numbers and print their sum.",
      lines:[
        {t:'a = int(input("Enter first number: "))', i:0},
        {t:'b = int(input("Enter second number: "))', i:0},
        {t:'total = a + b', i:0},
        {t:'print("Sum is:", total)', i:0},
      ],
      output:['Enter first number: 5','Enter second number: 3','Sum is: 8']},

    { id:"p2", concept:"simple", title:"Swap Two Numbers",
      brief:"Swap the values of a and b using a temp variable.",
      lines:[
        {t:'a = 5', i:0},
        {t:'b = 10', i:0},
        {t:'temp = a', i:0},
        {t:'a = b', i:0},
        {t:'b = temp', i:0},
        {t:'print("a =", a, "b =", b)', i:0},
      ],
      output:['a = 10 b = 5']},

    { id:"p3", concept:"ifelse", title:"Even or Odd",
      brief:"Use if / else to decide whether a number is even or odd.",
      lines:[
        {t:'num = int(input("Enter a number: "))', i:0},
        {t:'if num % 2 == 0:', i:0},
        {t:'print("Even")', i:1},
        {t:'else:', i:0},
        {t:'print("Odd")', i:1},
      ],
      output:['Enter a number: 7','Odd']},

    { id:"p4", concept:"ifelif", title:"Positive, Negative or Zero",
      brief:"Chain if / elif / else to classify a number.",
      lines:[
        {t:'num = int(input("Enter a number: "))', i:0},
        {t:'if num > 0:', i:0},
        {t:'print("Positive")', i:1},
        {t:'elif num < 0:', i:0},
        {t:'print("Negative")', i:1},
        {t:'else:', i:0},
        {t:'print("Zero")', i:1},
      ],
      output:['Enter a number: -3','Negative']},

    { id:"p5", concept:"ifelif", title:"Grade Calculator",
      brief:"Convert marks into a letter grade with if / elif / else.",
      lines:[
        {t:'marks = int(input("Enter marks: "))', i:0},
        {t:'if marks >= 90:', i:0},
        {t:'print("Grade A")', i:1},
        {t:'elif marks >= 75:', i:0},
        {t:'print("Grade B")', i:1},
        {t:'elif marks >= 50:', i:0},
        {t:'print("Grade C")', i:1},
        {t:'else:', i:0},
        {t:'print("Grade F")', i:1},
      ],
      output:['Enter marks: 82','Grade B']},

    { id:"p6", concept:"forloop", title:"Sum of First N Natural Numbers",
      brief:"Accumulate a total inside a for loop.",
      lines:[
        {t:'n = int(input("Enter n: "))', i:0},
        {t:'total = 0', i:0},
        {t:'for i in range(1, n + 1):', i:0},
        {t:'total = total + i', i:1},
        {t:'print("Sum is:", total)', i:0},
      ],
      output:['Enter n: 5','Sum is: 15']},

    { id:"p7", concept:"forloop", title:"Multiplication Table",
      brief:"Print the multiplication table of a number.",
      lines:[
        {t:'num = int(input("Enter a number: "))', i:0},
        {t:'for i in range(1, 11):', i:0},
        {t:'print(num, "x", i, "=", num * i)', i:1},
      ],
      output:['Enter a number: 6','6 x 1 = 6','6 x 2 = 12','6 x 3 = 18','...','6 x 10 = 60']},

    { id:"p8", concept:"whileloop", title:"Sum of Digits",
      brief:"Peel off digits one at a time with a while loop.",
      lines:[
        {t:'num = int(input("Enter a number: "))', i:0},
        {t:'total = 0', i:0},
        {t:'while num > 0:', i:0},
        {t:'digit = num % 10', i:1},
        {t:'total = total + digit', i:1},
        {t:'num = num // 10', i:1},
        {t:'print("Sum of digits:", total)', i:0},
      ],
      output:['Enter a number: 493','Sum of digits: 16']},

    { id:"p9", concept:"whileloop", title:"Factorial (While Loop)",
      brief:"Multiply down to 1 using a while loop.",
      lines:[
        {t:'n = int(input("Enter a number: "))', i:0},
        {t:'fact = 1', i:0},
        {t:'while n > 0:', i:0},
        {t:'fact = fact * n', i:1},
        {t:'n = n - 1', i:1},
        {t:'print("Factorial is:", fact)', i:0},
      ],
      output:['Enter a number: 5','Factorial is: 120']},

    { id:"p10", concept:"whileloop", title:"Reverse a Number",
      brief:"Rebuild a number backwards with a while loop.",
      lines:[
        {t:'num = int(input("Enter a number: "))', i:0},
        {t:'reversed_num = 0', i:0},
        {t:'while num > 0:', i:0},
        {t:'digit = num % 10', i:1},
        {t:'reversed_num = reversed_num * 10 + digit', i:1},
        {t:'num = num // 10', i:1},
        {t:'print("Reversed number:", reversed_num)', i:0},
      ],
      output:['Enter a number: 1234','Reversed number: 4321']},

    { id:"p11", concept:"ifelif", title:"Leap Year Check",
      brief:"Combine conditions to test for a leap year.",
      lines:[
        {t:'year = int(input("Enter a year: "))', i:0},
        {t:'if (year % 4 == 0 and year % 100 != 0) or (year % 400 == 0):', i:0},
        {t:'print("Leap Year")', i:1},
        {t:'else:', i:0},
        {t:'print("Not a Leap Year")', i:1},
      ],
      output:['Enter a year: 2024','Leap Year']},

    { id:"p12", concept:"ifelse", title:"Largest of Three Numbers",
      brief:"Compare three values using if / elif / else.",
      lines:[
        {t:'a, b, c = 5, 10, 3', i:0},
        {t:'if a >= b and a >= c:', i:0},
        {t:'print("a is largest")', i:1},
        {t:'elif b >= a and b >= c:', i:0},
        {t:'print("b is largest")', i:1},
        {t:'else:', i:0},
        {t:'print("c is largest")', i:1},
      ],
      output:['a, b, c = 5, 10, 3','b is largest']},
  ];

  // assign stable ids to each line for tracking order
  programs.forEach(p=>{
    p.lines.forEach((l,idx)=>{ l.id = p.id + "_l" + idx; });
    p.correctOrder = p.lines.map(l=>l.id);
  });

  const solved = new Set();
  let currentIdx = 0;
  let order = [];      // current array of line ids in displayed order
  let dragState = null;

  const $ = sel => document.querySelector(sel);
  const sidebarEl = $("#sidebar");
  const listEl = $("#list");
  const railEl = $("#rail");
  const feedbackEl = $("#feedback");
  const terminalEl = $("#terminal");
  const termBody = $("#termBody");
  const termLabel = $("#termLabel");

  function escapeHtml(s){
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  }

  function lineById(prog, id){ return prog.lines.find(l=>l.id===id); }

  function buildSidebar(){
    sidebarEl.innerHTML = "";
    const groups = {};
    programs.forEach((p,idx)=>{
      groups[p.concept] = groups[p.concept] || [];
      groups[p.concept].push({p, idx});
    });
    Object.keys(CONCEPTS).forEach(key=>{
      if(!groups[key]) return;
      const meta = CONCEPTS[key];
      const groupEl = document.createElement("div");
      groupEl.className = "concept-group";
      const label = document.createElement("div");
      label.className = "concept-label";
      label.innerHTML = `<span class="sw" style="background:${meta.color}"></span>${meta.label}`;
      groupEl.appendChild(label);
      groups[key].forEach(({p, idx})=>{
        const btn = document.createElement("button");
        btn.className = "prog-btn";
        btn.dataset.idx = idx;
        btn.innerHTML = `<span class="num">${String(idx+1).padStart(2,"0")}</span><span class="name">${p.title}</span><span class="check">✓</span>`;
        btn.addEventListener("click", ()=> loadProgram(idx));
        groupEl.appendChild(btn);
      });
      sidebarEl.appendChild(groupEl);
    });
    refreshSidebarState();
  }

  function refreshSidebarState(){
    sidebarEl.querySelectorAll(".prog-btn").forEach(btn=>{
      const idx = Number(btn.dataset.idx);
      btn.classList.toggle("active", idx===currentIdx);
      btn.classList.toggle("solved", solved.has(programs[idx].id));
    });
    $("#scoreText").textContent = `Solved ${solved.size} / ${programs.length}`;
    $("#scoreFill").style.width = (solved.size/programs.length*100) + "%";
  }

  function loadProgram(idx){
    currentIdx = idx;
    const prog = programs[idx];
    const meta = CONCEPTS[prog.concept];

    $("#conceptTag").innerHTML = `<span class="concept-tag" style="border-color:${meta.color}55; color:${meta.color}"><span class="sw" style="background:${meta.color}"></span>${meta.label}</span>`;
    $("#progTitle").textContent = prog.title;
    $("#progBrief").textContent = prog.brief;

    let shuffled;
    do { shuffled = shuffle(prog.correctOrder); }
    while(shuffled.join() === prog.correctOrder.join() && prog.correctOrder.length>1);
    order = shuffled;

    feedbackEl.textContent = "";
    feedbackEl.className = "feedback-row";
    terminalEl.classList.remove("show");
    termBody.innerHTML = "";

    renderRail(prog.lines.length);
    renderList();
    refreshSidebarState();
  }

  function renderRail(n){
    railEl.innerHTML = "";
    for(let i=0;i<n;i++){
      const d = document.createElement("div");
      d.className = "rail-num";
      d.textContent = i+1;
      railEl.appendChild(d);
    }
  }

  function renderList(){
    const prog = programs[currentIdx];
    listEl.innerHTML = "";
    order.forEach((id, pos)=>{
      const line = lineById(prog, id);
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.id = id;
      card.innerHTML = `
        <span class="grip">⠿</span>
        ${line.i>0 ? `<span class="indent-guide"></span>` : ""}
        <code>${escapeHtml(line.t)}</code>
        <span class="microbtns">
          <button class="mv-up" title="Move up">▲</button>
          <button class="mv-down" title="Move down">▼</button>
        </span>
      `;
      card.querySelector(".mv-up").addEventListener("click", (e)=>{ e.stopPropagation(); moveCard(id,-1); });
      card.querySelector(".mv-down").addEventListener("click", (e)=>{ e.stopPropagation(); moveCard(id,1); });
      card.addEventListener("pointerdown", onPointerDown);
      listEl.appendChild(card);
    });
    updateMicroBtnStates();
  }

  function updateMicroBtnStates(){
    const cards = [...listEl.children];
    cards.forEach((c,i)=>{
      c.querySelector(".mv-up").disabled = (i===0);
      c.querySelector(".mv-down").disabled = (i===cards.length-1);
    });
  }

  function moveCard(id, dir){
    const i = order.indexOf(id);
    const j = i + dir;
    if(j<0 || j>=order.length) return;
    [order[i], order[j]] = [order[j], order[i]];
    clearFeedbackStates();
    renderList();
  }

  function clearFeedbackStates(){
    feedbackEl.textContent = "";
    feedbackEl.className = "feedback-row";
    terminalEl.classList.remove("show");
    railEl.querySelectorAll(".rail-num").forEach(r=>r.classList.remove("trace-on"));
  }

  // ---------- Drag reordering (pointer events, mouse + touch) ----------
  function onPointerDown(e){
    const card = e.currentTarget;
    if(e.target.closest(".microbtns")) return;
    e.preventDefault();
    const rect = card.getBoundingClientRect();
    dragState = {
      id: card.dataset.id,
      startY: e.clientY,
      offsetY: e.clientY - rect.top,
      height: rect.height + 8,
    };
    card.setPointerCapture(e.pointerId);
    card.classList.add("dragging");
    card.style.position = "relative";
    card.style.zIndex = 20;
    document.addEventListener("pointermove", onPointerMove);
    document.addEventListener("pointerup", onPointerUp, {once:true});
  }

  function onPointerMove(e){
    if(!dragState) return;
    const card = listEl.querySelector(`.card[data-id="${dragState.id}"]`);
    if(!card) return;
    const dy = e.clientY - dragState.startY;
    card.style.transform = `translateY(${dy}px)`;

    // Determine swap target based on pointer position relative to siblings
    const siblings = [...listEl.children].filter(c=>c!==card);
    const pointerY = e.clientY;
    let targetIndex = order.indexOf(dragState.id);

    for(let i=0;i<siblings.length;i++){
      const sib = siblings[i];
      const r = sib.getBoundingClientRect();
      const mid = r.top + r.height/2;
      const sibId = sib.dataset.id;
      const sibOrderIdx = order.indexOf(sibId);
      if(pointerY < mid && sibOrderIdx < order.indexOf(dragState.id)){
        targetIndex = Math.min(targetIndex, sibOrderIdx);
      }
      if(pointerY > mid && sibOrderIdx > order.indexOf(dragState.id)){
        targetIndex = Math.max(targetIndex, sibOrderIdx);
      }
    }

    const curIndex = order.indexOf(dragState.id);
    if(targetIndex !== curIndex){
      order.splice(curIndex,1);
      order.splice(targetIndex,0,dragState.id);
      // re-render but keep dragging card visually following pointer
      renderList();
      const newCard = listEl.querySelector(`.card[data-id="${dragState.id}"]`);
      newCard.classList.add("dragging");
      newCard.style.position = "relative";
      newCard.style.zIndex = 20;
      newCard.style.transform = `translateY(${dy}px)`;
    }
  }

  function onPointerUp(){
    document.removeEventListener("pointermove", onPointerMove);
    if(!dragState) return;
    const card = listEl.querySelector(`.card[data-id="${dragState.id}"]`);
    if(card){
      card.classList.remove("dragging");
      card.style.transform = "";
      card.style.zIndex = "";
    }
    dragState = null;
    clearFeedbackStates();
    updateMicroBtnStates();
  }

  // ---------- Check / Run ----------
  function runProgram(){
    const prog = programs[currentIdx];
    const cards = [...listEl.children];
    let allCorrect = true;

    cards.forEach((card, pos)=>{
      const isCorrect = order[pos] === prog.correctOrder[pos];
      card.classList.remove("correct","wrong");
      card.classList.add(isCorrect ? "correct" : "wrong");
      if(!isCorrect) allCorrect = false;
    });

    if(allCorrect){
      feedbackEl.className = "feedback-row ok";
      feedbackEl.textContent = "✓ Compiled clean — every line is in the right place.";
      solved.add(prog.id);
      refreshSidebarState();
      lightTraces();
      showTerminal(prog);
    } else {
      feedbackEl.className = "feedback-row bad";
      feedbackEl.textContent = "✗ Not quite — the red lines are out of place. Green ones are correct.";
      setTimeout(()=>{
        cards.forEach(c=>c.classList.remove("wrong"));
      }, 500);
    }
  }

  function lightTraces(){
    const rails = [...railEl.querySelectorAll(".rail-num")];
    rails.forEach((r,i)=>{
      setTimeout(()=> r.classList.add("trace-on"), i*70);
    });
  }

  function showTerminal(prog){
    termBody.innerHTML = "";
    termLabel.textContent = `output — ${prog.title.toLowerCase()}`;
    terminalEl.classList.add("show");
    prog.output.forEach((line, i)=>{
      const div = document.createElement("div");
      div.className = "line";
      div.style.animationDelay = (i*0.12)+"s";
      div.innerHTML = `<span class="prompt">&gt;</span> ${escapeHtml(line)}`;
      termBody.appendChild(div);
    });
  }

  $("#runBtn").addEventListener("click", runProgram);
  $("#shuffleBtn").addEventListener("click", ()=> loadProgram(currentIdx));

  buildSidebar();
  loadProgram(0);
})();
</script>
</body>
</html>
